<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Calgary Road Construction Tracker</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;600;700&family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>

<style>
  :root{
    --bg: #F6F4EF;
    --panel: #FFFFFF;
    --ink: #1D1B17;
    --ink-soft: #5B574E;
    --line: #E3DFD4;
    --orange: #E1590A;
    --orange-deep: #B8440A;
    --slate: #2C4A54;
    --slate-soft: #6C8790;
    --amber-tag: #F2A93C;
    --active-bg: #FFF1E6;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;height:100%;background:var(--bg);color:var(--ink);font-family:'Inter',system-ui,sans-serif;}
  #root{height:100%;}

  .app{
    display:flex;
    height:100vh;
    width:100vw;
    overflow:hidden;
  }

  /* ---------- Header / brand strip shared ---------- */
  .brand{
    display:flex;
    align-items:center;
    gap:10px;
    padding:14px 18px 12px 18px;
    border-bottom:1px solid var(--line);
    background:var(--panel);
  }
  .brand .mark{
    width:30px;height:30px;flex:none;
    background:repeating-linear-gradient(45deg, var(--orange) 0 6px, #1D1B17 6px 12px);
    border-radius:4px;
  }
  .brand h1{
    font-family:'Barlow Condensed', sans-serif;
    font-weight:700;
    font-size:22px;
    letter-spacing:0.01em;
    margin:0;
    line-height:1.05;
    text-transform:uppercase;
  }
  .brand .sub{
    font-size:11px;
    color:var(--ink-soft);
    font-family:'IBM Plex Mono', monospace;
    margin-top:2px;
  }

  /* ---------- Left column (list) ---------- */
  .list-pane{
    width:420px;
    flex:none;
    display:flex;
    flex-direction:column;
    border-right:1px solid var(--line);
    background:var(--panel);
    height:100vh;
  }

  .search-wrap{
    padding:14px 18px;
    border-bottom:1px solid var(--line);
    display:flex;
    flex-direction:column;
    gap:10px;
  }
  .search-box{
    position:relative;
  }
  .search-box input{
    width:100%;
    padding:10px 14px 10px 36px;
    border:1.5px solid var(--line);
    border-radius:8px;
    font-size:14px;
    font-family:'Inter',sans-serif;
    background:var(--bg);
    color:var(--ink);
    outline:none;
    transition:border-color .15s ease;
  }
  .search-box input:focus{ border-color: var(--orange); }
  .search-box svg{
    position:absolute; left:11px; top:50%; transform:translateY(-50%);
    color:var(--ink-soft);
  }
  .search-meta{
    font-family:'IBM Plex Mono', monospace;
    font-size:11px;
    color:var(--ink-soft);
    display:flex;
    justify-content:space-between;
    align-items:center;
  }
  .clear-btn{
    background:none;border:none;color:var(--orange-deep);font-family:'IBM Plex Mono',monospace;
    font-size:11px;cursor:pointer;padding:0;text-decoration:underline;
  }

  .list-scroll{
    flex:1;
    overflow-y:auto;
    padding:10px 12px 24px 12px;
  }

  .status-line{
    padding:24px 18px;
    text-align:center;
    color:var(--ink-soft);
    font-size:13px;
    font-family:'IBM Plex Mono', monospace;
  }
  .status-line.error{ color: var(--orange-deep); }

  .card{
    background:var(--panel);
    border:1.5px solid var(--line);
    border-radius:10px;
    padding:12px 14px;
    margin-bottom:10px;
    cursor:pointer;
    transition: border-color .15s ease, background .15s ease, transform .1s ease;
  }
  .card:hover{ border-color: var(--slate-soft); }
  .card.active{
    border-color: var(--orange);
    background: var(--active-bg);
  }
  .card-top{
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
    gap:8px;
    margin-bottom:6px;
  }
  .card-title{
    font-family:'Barlow Condensed', sans-serif;
    font-weight:600;
    font-size:17px;
    line-height:1.15;
    text-transform:uppercase;
    letter-spacing:0.01em;
  }
  .pin-badge{
    flex:none;
    width:22px;height:22px;
    border-radius:50%;
    background:var(--orange);
    color:#fff;
    font-family:'IBM Plex Mono',monospace;
    font-size:11px;
    display:flex;align-items:center;justify-content:center;
    font-weight:600;
  }
  .card-quadrant{
    display:inline-block;
    font-family:'IBM Plex Mono', monospace;
    font-size:10px;
    letter-spacing:0.04em;
    text-transform:uppercase;
    color:var(--slate);
    background:#EAF0F1;
    padding:2px 7px;
    border-radius:4px;
    margin-bottom:6px;
  }
  .card-desc{
    font-size:12.5px;
    color:var(--ink-soft);
    line-height:1.45;
  }
  .card-dates{
    margin-top:8px;
    font-family:'IBM Plex Mono', monospace;
    font-size:10.5px;
    color:var(--slate-soft);
    display:flex;
    gap:12px;
  }

  /* ---------- Right column (map) ---------- */
  .map-pane{
    flex:1;
    position:relative;
    height:100vh;
  }
  #leaflet-map{
    height:100%;
    width:100%;
  }
  .leaflet-popup-content-wrapper{
    border-radius:8px;
    font-family:'Inter',sans-serif;
  }
  .leaflet-popup-content{ margin:12px 14px; font-size:13px; }
  .popup-title{
    font-family:'Barlow Condensed',sans-serif;
    font-weight:700;
    text-transform:uppercase;
    font-size:15px;
    margin-bottom:4px;
  }

  .construction-pin{
    width:26px;height:26px;
    background:var(--orange);
    border:2.5px solid #fff;
    border-radius:50% 50% 50% 0;
    transform: rotate(-45deg);
    box-shadow:0 2px 5px rgba(0,0,0,.35);
  }
  .construction-pin.active{
    background:var(--slate);
    width:32px;height:32px;
  }

  .map-count-chip{
    position:absolute;
    top:14px;
    left:14px;
    z-index:500;
    background:rgba(255,255,255,.95);
    border:1px solid var(--line);
    border-radius:8px;
    padding:6px 12px;
    font-family:'IBM Plex Mono',monospace;
    font-size:11px;
    color:var(--ink-soft);
    box-shadow:0 2px 8px rgba(0,0,0,.08);
  }

  /* ---------- mobile tabs ---------- */
  .mobile-tabs{
    display:none;
  }

  @media (max-width: 860px){
    .app{ flex-direction:column; }
    .list-pane, .map-pane{
      width:100%;
      flex:none;
    }
    .list-pane{
      height:auto;
      border-right:none;
      border-bottom:1px solid var(--line);
    }
    .mobile-tabs{
      display:flex;
      border-bottom:1px solid var(--line);
      background:var(--panel);
    }
    .mobile-tabs button{
      flex:1;
      padding:11px 0;
      background:none;
      border:none;
      font-family:'Barlow Condensed',sans-serif;
      font-weight:600;
      font-size:14px;
      text-transform:uppercase;
      letter-spacing:0.03em;
      color:var(--ink-soft);
      border-bottom:3px solid transparent;
      cursor:pointer;
    }
    .mobile-tabs button.active{
      color:var(--orange-deep);
      border-bottom-color:var(--orange);
    }
    .list-pane.mobile-hidden, .map-pane.mobile-hidden{
      display:none;
    }
    .list-scroll{
      max-height: calc(100vh - 170px);
    }
    .map-pane{
      height: calc(100vh - 105px);
    }
  }

  ::-webkit-scrollbar{ width:8px; }
  ::-webkit-scrollbar-thumb{ background:var(--line); border-radius:4px; }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" data-presets="react">
const { useState, useEffect, useRef, useMemo, useCallback } = React;

const DATA_URL = "https://data.calgary.ca/resource/sizs-hgef.json?$limit=1000";
const CALGARY_CENTER = [51.0447, -114.0719];

// ---- defensive field extraction: Socrata field names vary by dataset revision ----
function getLatLng(row) {
  // Common possibilities: `point` / `the_geom` / `location` GeoJSON-ish objects,
  // or split latitude/longitude fields.
  const geoCandidates = [row.point, row.the_geom, row.location, row.location_1, row.geo_point_2d];
  for (const g of geoCandidates) {
    if (!g) continue;
    if (g.coordinates && Array.isArray(g.coordinates)) {
      const [lng, lat] = g.coordinates;
      if (typeof lat === "number" && typeof lng === "number") return [lat, lng];
    }
    if (typeof g.latitude !== "undefined" && typeof g.longitude !== "undefined") {
      const lat = parseFloat(g.latitude), lng = parseFloat(g.longitude);
      if (!isNaN(lat) && !isNaN(lng)) return [lat, lng];
    }
  }
  const latKeys = ["latitude", "lat", "y"];
  const lngKeys = ["longitude", "lng", "long", "x"];
  let lat, lng;
  for (const k of latKeys) if (row[k] != null) lat = parseFloat(row[k]);
  for (const k of lngKeys) if (row[k] != null) lng = parseFloat(row[k]);
  if (!isNaN(lat) && !isNaN(lng) && lat && lng) return [lat, lng];
  return null;
}

function pick(row, keys, fallback) {
  for (const k of keys) {
    if (row[k] != null && String(row[k]).trim() !== "") return row[k];
  }
  return fallback;
}

function normalizeRow(row, idx) {
  const latlng = getLatLng(row);
  const title = pick(row, ["project_name", "projectname", "name", "title", "project"], "Road Construction Project");
  const location = pick(row, ["location", "address", "location_description", "loc_desc", "street", "location_1"], "Location not specified");
  const quadrant = pick(row, ["quadrant", "quad", "ward"], null);
  const description = pick(row, ["description", "project_description", "comments", "details", "type", "project_type"], "No additional description provided.");
  const startDate = pick(row, ["start_date", "startdate", "date_start"], null);
  const endDate = pick(row, ["end_date", "enddate", "date_end", "completion_date"], null);
  const status = pick(row, ["status", "project_status"], null);

  return {
    id: row.objectid || row.id || `row-${idx}`,
    title: String(title),
    location: String(location),
    quadrant: quadrant ? String(quadrant) : null,
    description: String(description),
    startDate, endDate, status,
    latlng,
    raw: row,
  };
}

function formatDate(d) {
  if (!d) return null;
  try {
    const dt = new Date(d);
    if (isNaN(dt.getTime())) return String(d).slice(0, 10);
    return dt.toLocaleDateString("en-CA", { year: "numeric", month: "short", day: "numeric" });
  } catch (e) {
    return String(d).slice(0, 10);
  }
}

function ConstructionMarker({ svg }) {
  return null;
}

function App() {
  const [projects, setProjects] = useState([]);
  const [loadState, setLoadState] = useState("loading"); // loading | ready | error
  const [errorMsg, setErrorMsg] = useState("");
  const [query, setQuery] = useState("");
  const [activeId, setActiveId] = useState(null);
  const [mobileView, setMobileView] = useState("list"); // list | map

  const mapRef = useRef(null);
  const leafletMapInstance = useRef(null);
  const markersRef = useRef({}); // id -> leaflet marker
  const cardRefs = useRef({});

  // ---- fetch data ----
  useEffect(() => {
    let cancelled = false;
    async function load() {
      setLoadState("loading");
      try {
        const res = await fetch(DATA_URL);
        if (!res.ok) throw new Error(`Calgary Open Data responded with ${res.status}`);
        const data = await res.json();
        if (cancelled) return;
        if (!Array.isArray(data)) throw new Error("Unexpected response shape from Open Data API");
        const normalized = data.map(normalizeRow).filter(p => p.latlng);
        if (normalized.length === 0) {
          setErrorMsg("The dataset returned no items with map coordinates.");
          setLoadState("error");
        } else {
          setProjects(normalized);
          setLoadState("ready");
        }
      } catch (err) {
        if (cancelled) return;
        setErrorMsg(err.message || "Could not reach Calgary's Open Data service.");
        setLoadState("error");
      }
    }
    load();
    return () => { cancelled = true; };
  }, []);

  // ---- filtered list ----
  const filtered = useMemo(() => {
    const q = query.trim().toLowerCase();
    if (!q) return projects;
    return projects.filter(p =>
      p.title.toLowerCase().includes(q) ||
      p.location.toLowerCase().includes(q) ||
      (p.quadrant && p.quadrant.toLowerCase().includes(q)) ||
      p.description.toLowerCase().includes(q)
    );
  }, [projects, query]);

  // ---- init map once ----
  useEffect(() => {
    if (leafletMapInstance.current || !mapRef.current) return;
    const map = L.map(mapRef.current, {
      center: CALGARY_CENTER,
      zoom: 11,
      zoomControl: true,
      scrollWheelZoom: true,
    });
    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
      maxZoom: 19,
      attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
    }).addTo(map);
    leafletMapInstance.current = map;

    // fix sizing issues after mount (flex layouts sometimes render map at 0 height first)
    setTimeout(() => map.invalidateSize(), 150);
    window.addEventListener("resize", () => map.invalidateSize());
  }, []);

  function iconFor(active) {
    return L.divIcon({
      className: "",
      html: `<div class="construction-pin${active ? " active" : ""}"></div>`,
      iconSize: active ? [32, 32] : [26, 26],
      iconAnchor: active ? [16, 32] : [13, 26],
      popupAnchor: [0, -26],
    });
  }

  // ---- sync markers with filtered projects ----
  useEffect(() => {
    const map = leafletMapInstance.current;
    if (!map) return;

    // remove markers no longer in filtered set
    Object.keys(markersRef.current).forEach((id) => {
      if (!filtered.find(p => String(p.id) === id)) {
        map.removeLayer(markersRef.current[id]);
        delete markersRef.current[id];
      }
    });

    filtered.forEach((p) => {
      const key = String(p.id);
      if (markersRef.current[key]) {
        markersRef.current[key].setIcon(iconFor(activeId === p.id));
        return;
      }
      const marker = L.marker(p.latlng, { icon: iconFor(activeId === p.id) });
      marker.bindPopup(
        `<div class="popup-title">${escapeHtml(p.title)}</div>
         <div style="color:#5B574E; margin-bottom:4px;">${escapeHtml(p.location)}</div>
         <div style="font-size:12px; color:#1D1B17;">${escapeHtml(p.description).slice(0, 180)}</div>`
      );
      marker.on("click", () => setActiveId(p.id));
      marker.addTo(map);
      markersRef.current[key] = marker;
    });
  }, [filtered, activeId]);

  // update icon styling when activeId changes (without re-adding)
  useEffect(() => {
    Object.entries(markersRef.current).forEach(([id, marker]) => {
      const isActive = activeId !== null && String(activeId) === id;
      marker.setIcon(iconFor(isActive));
    });
  }, [activeId]);

  const selectProject = useCallback((p) => {
    setActiveId(p.id);
    const map = leafletMapInstance.current;
    if (map && p.latlng) {
      map.flyTo(p.latlng, Math.max(map.getZoom(), 14), { duration: 0.6 });
      const marker = markersRef.current[String(p.id)];
      if (marker) setTimeout(() => marker.openPopup(), 350);
    }
    setMobileView("map");
  }, []);

  // when a marker is clicked directly, scroll its card into view (desktop only, harmless on mobile)
  useEffect(() => {
    if (activeId == null) return;
    const el = cardRefs.current[activeId];
    if (el) el.scrollIntoView({ block: "nearest", behavior: "smooth" });
  }, [activeId]);

  return (
    <div className="app">
      <div className="mobile-tabs">
        <button className={mobileView === "list" ? "active" : ""} onClick={() => setMobileView("list")}>
          List
        </button>
        <button className={mobileView === "map" ? "active" : ""} onClick={() => setMobileView("map")}>
          Map
        </button>
      </div>

      <div className={`list-pane ${mobileView !== "list" ? "mobile-hidden" : ""}`}>
        <div className="brand">
          <div className="mark"></div>
          <div>
            <h1>Calgary Roadwork</h1>
            <div className="sub">Live from data.calgary.ca</div>
          </div>
        </div>

        <div className="search-wrap">
          <div className="search-box">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
              <circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
            </svg>
            <input
              type="text"
              placeholder="Search by location, quadrant, or project..."
              value={query}
              onChange={(e) => setQuery(e.target.value)}
            />
          </div>
          <div className="search-meta">
            <span>{loadState === "ready" ? `${filtered.length} of ${projects.length} project${projects.length === 1 ? "" : "s"}` : "—"}</span>
            {query && <button className="clear-btn" onClick={() => setQuery("")}>clear</button>}
          </div>
        </div>

        <div className="list-scroll">
          {loadState === "loading" && (
            <div className="status-line">Loading current construction projects…</div>
          )}
          {loadState === "error" && (
            <div className="status-line error">
              Couldn't load live data: {errorMsg}<br/>
              Try refreshing, or the Open Data service may be temporarily unavailable.
            </div>
          )}
          {loadState === "ready" && filtered.length === 0 && (
            <div className="status-line">No projects match "{query}".</div>
          )}
          {loadState === "ready" && filtered.map((p, i) => (
            <div
              key={p.id}
              ref={(el) => (cardRefs.current[p.id] = el)}
              className={`card ${activeId === p.id ? "active" : ""}`}
              onClick={() => selectProject(p)}
            >
              <div className="card-top">
                <div className="card-title">{p.title}</div>
                <div className="pin-badge">{i + 1}</div>
              </div>
              {p.quadrant && <span className="card-quadrant">{p.quadrant}</span>}
              <div className="card-desc">{p.location}</div>
              {(p.startDate || p.endDate) && (
                <div className="card-dates">
                  {p.startDate && <span>Start: {formatDate(p.startDate)}</span>}
                  {p.endDate && <span>End: {formatDate(p.endDate)}</span>}
                </div>
              )}
            </div>
          ))}
        </div>
      </div>

      <div className={`map-pane ${mobileView !== "map" ? "mobile-hidden" : ""}`}>
        {loadState === "ready" && (
          <div className="map-count-chip">{filtered.length} pin{filtered.length === 1 ? "" : "s"} shown</div>
        )}
        <div id="leaflet-map" ref={mapRef}></div>
      </div>
    </div>
  );
}

function escapeHtml(str) {
  const div = document.createElement("div");
  div.textContent = str == null ? "" : String(str);
  return div.innerHTML;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
